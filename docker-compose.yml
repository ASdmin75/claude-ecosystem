services:
  server:
    build: .
    ports:
      - "${SERVER_PORT:-3580}:3580"
    volumes:
      - ./tasks.yaml:/app/tasks.yaml
      - ./.claude/agents/:/app/.claude/agents/
      - server-data:/app/data
      - ${WORKSPACE_DIR:-./workspace}:/app/workspace
      # Claude Code auth — see docs/user-guide.md#docker for setup options
      - claude-auth:/root/.claude
    env_file:
      - .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3580/api/v1/dashboard"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  server-data:
  claude-auth:
