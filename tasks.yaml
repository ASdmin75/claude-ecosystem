domains:
    export-by-aviation:
        description: Лиды с export.by — белорусские экспортёры, нуждающиеся в авиаперевозке грузов. MCP-сервер exportby выполняет скрейпинг сайта и хранит сырые данные в raw_companies. Задача analyze оценивает aviation_priority на основе данных в БД без обращения к сайту.
        data_dir: data/export-by-aviation
        db: leads.db
        schema: |-
            CREATE TABLE IF NOT EXISTS companies (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              export_by_id INTEGER,
              name TEXT NOT NULL,
              url TEXT,
              description TEXT,
              products TEXT,
              contact_info TEXT,
              export_destinations TEXT,
              needs_aviation INTEGER DEFAULT 0,
              aviation_priority INTEGER DEFAULT 0,
              found_date TEXT NOT NULL,
              status TEXT DEFAULT 'new',
              sent_at TEXT,
              notes TEXT,
              UNIQUE(name)
            );

            CREATE TABLE IF NOT EXISTS scan_log (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              scanned_at TEXT NOT NULL,
              pages_scanned INTEGER,
              new_leads_found INTEGER,
              notes TEXT
            );

            CREATE TABLE IF NOT EXISTS raw_companies (
              id INTEGER PRIMARY KEY,
              export_by_id INTEGER UNIQUE NOT NULL,
              name TEXT NOT NULL,
              description TEXT,
              country TEXT,
              logo TEXT,
              products TEXT,
              products_fetched INTEGER DEFAULT 0,
              scraped_at TEXT NOT NULL,
              updated_at TEXT
            );

            CREATE TABLE IF NOT EXISTS scan_progress (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              last_page INTEGER NOT NULL,
              total_pages INTEGER,
              total_companies INTEGER,
              companies_added INTEGER DEFAULT 0,
              scanned_at TEXT NOT NULL
            );

            CREATE TABLE IF NOT EXISTS rejected_companies (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              name TEXT UNIQUE NOT NULL,
              reason TEXT,
              rejected_at TEXT NOT NULL
            );
        domain_doc: DOMAIN.md
        tasks:
            - sync-export-by-catalog
            - process-export-by-leads
        pipelines:
            - export-by-aviation-to-ceo
            - export-by-sync
        agents:
            - export-by-scraper
        mcp_servers:
            - database
            - exportby
            - telegram
            - email
    leads:
        description: B2B logistics leads for EAEU market
        data_dir: data/leads
        db: leads.db
        schema: |
            CREATE TABLE IF NOT EXISTS leads (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              name TEXT NOT NULL,
              tax_id TEXT,
              country TEXT,
              industry TEXT,
              city TEXT,
              website TEXT,
              contact_person TEXT,
              contact_email TEXT,
              contact_phone TEXT,
              source_url TEXT,
              status TEXT DEFAULT 'new',
              notes TEXT,
              raw_json TEXT,
              found_at DATETIME DEFAULT CURRENT_TIMESTAMP,
              updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
            );
            CREATE UNIQUE INDEX IF NOT EXISTS idx_leads_tax_id ON leads(tax_id) WHERE tax_id IS NOT NULL;
            CREATE INDEX IF NOT EXISTS idx_leads_name ON leads(name);
        domain_doc: DOMAIN.md
        tasks:
            - find-leads
            - compile-leads-excel
            - deliver-leads-report
        pipelines:
            - leads-to-ceo
        agents:
            - eaeu-logistics-lead-finder
            - leads-report-compiler
        mcp_servers:
            - database
            - excel
    sip-calls:
        description: Yeastar P-Series SIP station call recordings, transcriptions, and daily summaries
        data_dir: data/sip-calls
        db: sip-calls.db
        schema: CREATE TABLE IF NOT EXISTS recordings (id INTEGER PRIMARY KEY AUTOINCREMENT, call_id TEXT UNIQUE, filename TEXT, caller TEXT, callee TEXT, duration INTEGER, call_date TEXT, download_path TEXT, transcription_path TEXT, summary TEXT, processed_at TEXT, created_at TEXT DEFAULT CURRENT_TIMESTAMP); CREATE TABLE IF NOT EXISTS daily_reports (id INTEGER PRIMARY KEY AUTOINCREMENT, report_date TEXT UNIQUE, total_calls INTEGER, total_duration INTEGER, digest TEXT, delivered_at TEXT, created_at TEXT DEFAULT CURRENT_TIMESTAMP);
        domain_doc: DOMAIN.md
        tasks:
            - fetch-sip-recordings
            - transcribe-sip-recordings
            - summarize-sip-transcriptions
            - deliver-sip-report
        pipelines:
