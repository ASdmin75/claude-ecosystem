claude_bin: claude
tasks:
    - name: code-review
      prompt: |
        Review the Go code in the working directory.
        Focus on: error handling, concurrency safety, and idiomatic Go patterns.
        Output a brief summary of findings.

        Rate each finding as High, Medium, or Low severity.

        If there are no High or Medium severity findings remaining, output the
        exact line "LGTM" at the end of your response to signal that the code
        is in good shape.

        {{if .PrevOutput}}
        Previous review/fix context from the last iteration:
        ---
        {{.PrevOutput}}
        ---
        Focus on whether previous issues were fixed and look for any new issues
        introduced by the fixes. Do not repeat issues that have already been fixed.
        {{end}}
      work_dir: .
      tags:
        - review
        - quality
    - name: code-fixer
      prompt: |
        You are a code fixer. Apply the fixes described in the review below.
        Only fix High and Medium severity issues. Leave Low severity issues alone.
        Make minimal, targeted changes — do not refactor or restructure beyond
        what is needed to fix the specific issues.

        Review findings to fix:
        ---
        {{.PrevOutput}}
        ---
      work_dir: .
      tags:
        - fix
        - quality
      timeout: 10m
    - name: test-generator
      prompt: |
        Analyze the Go source files and generate missing unit tests.
        Use table-driven tests where appropriate.
        Only output the test code, no explanations.
      work_dir: .
      tags:
        - tests
    - name: on-save-lint
      prompt: |
        Review the recently changed file: {{.File}}
        Check for common Go mistakes, suggest improvements.
        Be concise - max 5 bullet points.
      work_dir: .
      watch:
        paths:
            - .
        extensions:
            - .go
        debounce: 3s
      tags:
        - lint
        - realtime
    - name: todo-tracker
      prompt: |
        Find all TODO, FIXME, HACK comments in the codebase.
        Categorize by priority and suggest an action plan.
      work_dir: .
      tags:
        - tracking
    - name: find-new-eaeu-logistics-lead
      prompt: "Найди 100 новых потенциальных клиентов для логистическо-экспедиционной компании из РБ работающей на рынке ЕАЭС с ледующих отраслях:\n- фарма\n- электроника\nКомапнии должны быть резидентами РБ. \nИспользуй сабагента eaeu-logistics-lead-finder"
      work_dir: .
      model: sonnet
      timeout: 60m
      permission_mode: dontAsk
    - name: find-leads
      domain: leads
      prompt: |
        Найди 50 новых потенциальных клиентов для логистическо-экспедиционной компании из РБ работающей на рынке ЕАЭС с ледующих отраслях:
        - фарма
        - электроника
        - химическая и нефтехимическая промышленность
        - деревообрабатывающая и целлюлозно-бумажная промышленность
        - машиностроение и металлообработка
        Комапнии должны быть резидентами РБ.
        Используй сабагента eaeu-logistics-lead-finder
      work_dir: .
      tags:
        - leads
        - sales
      model: sonnet
      timeout: 60m
      agents:
        - eaeu-logistics-lead-finder
      mcp_servers:
        - database
      allowed_tools:
        - Agent
        - WebSearch
        - WebFetch
        - mcp__database__check_exists
        - mcp__database__insert
        - mcp__database__query
      max_turns: 50
      permission_mode: dontAsk
    - name: compile-leads-excel
      domain: leads
      prompt: |
        Получи все лиды из базы данных через mcp__database__query.
        SQL: SELECT * FROM leads WHERE status = 'new' ORDER BY found_at DESC

        Создай Excel-отчёт для CEO: workspace/leads/leads-report-{{.DateTime}}.xlsx
        Используй инструменты create_spreadsheet и add_styled_table.
        Добавь лист 'Leads' с таблицей всех лидов и лист 'Summary' с итогами по источникам.
        Верни только путь к созданному файлу.
      work_dir: .
      tags:
        - leads
        - excel
      timeout: 10m
      agents:
        - leads-report-compiler
      mcp_servers:
        - excel
        - database
      allowed_tools:
        - mcp__excel__create_spreadsheet
        - mcp__excel__add_styled_table
        - mcp__excel__write_spreadsheet
        - mcp__excel__read_spreadsheet
        - mcp__database__query
      permission_mode: dontAsk
    - name: deliver-leads-report
      domain: leads
      prompt: "Доставь отчёт по лидам. Файл: {{.PrevOutput}}\n\nШаг 1. Одним запросом получи данные:\nSELECT COUNT(*) AS total FROM leads WHERE status='new';\nSELECT COUNT(DISTINCT source_url) AS sources FROM leads WHERE status='new';\nSELECT name, industry FROM leads WHERE status='new' ORDER BY found_at DESC LIMIT 5;\n\nШаг 2. Составь сводку ТОЧНО в этом формате (подставь данные):\n\U0001F4CA Отчёт по лидам — {{.Date}}\nНовых: {total}\nИсточников: {sources}\nТоп:\n• {name} — {industry}\n\U0001F4CE Excel-файл с деталями приложен.\n\nШаг 3. Отправь эту сводку через send_message в Telegram.\nШаг 4. Отправь Excel через send_document в Telegram.\nШаг 5. Отправь email на alexstav1975@yandex.by, тема \"\U0001F4CA Отчёт по лидам — {{.Date}}\", тело = та же сводка, вложение = Excel.\nШаг 6. Скопируй файл в workspace/ceo/reports/.\n\nСводка в TG и email ИДЕНТИЧНА. Ничего лишнего не добавляй.\n"
      work_dir: .
      tags:
        - leads
        - delivery
      timeout: 10m
      agents:
        - delivery-agent
      mcp_servers:
        - email
        - filesystem
        - telegram
        - database
      allowed_tools:
        - mcp__email__send_email
        - mcp__filesystem__copy_file
        - mcp__telegram__send_message
        - mcp__telegram__send_document
        - mcp__database__query
      permission_mode: dontAsk
    - name: sync-export-by-catalog
      domain: export-by-aviation
      prompt: |-
        Сегодня {{.Date}}. Синхронизируй каталог компаний с export.by в локальную БД.

        1. Вызови mcp__exportby__get_stats — проверь текущий прогресс.
        2. Если каталог ещё не полностью просканирован, вызови mcp__exportby__sync_catalog с max_pages=100 для продолжения.
        3. Если каталог уже полный, вызови mcp__exportby__check_new для проверки новых записей.
        4. Проверь финальную статистику через mcp__exportby__get_stats.

        Формат вывода:
        СИНХРОНИЗАЦИЯ: страниц N/N, компаний в БД N из N
        НОВЫХ КОМПАНИЙ: N
        СТАТУС: [завершено/в процессе]
      work_dir: .
      tags:
        - leads
        - aviation
        - export-by
        - sync
      model: haiku
      timeout: 10m
      mcp_servers:
        - exportby
      allowed_tools:
        - mcp__exportby__sync_catalog
        - mcp__exportby__check_new
        - mcp__exportby__get_stats
      max_turns: 15
      max_budget_usd: 0.05
      permission_mode: bypassPermissions
    - name: process-export-by-leads
      domain: export-by-aviation
      prompt: "Сегодня {{.Date}}. Обработай лиды для авиаперевозки.\nПорог отправки: 15 лидов.\n\n=== АЛГОРИТМ ===\n\nШАГ 1. Вызови mcp__exportby__get_pending_count — узнай количество готовых лидов (status='new').\n\nШАГ 2. ЕСЛИ pending >= 15 → переходи к ОТПРАВКЕ (шаг 4).\n\nШАГ 3. ЕСЛИ pending < 15 → выполни АНАЛИЗ новой порции:\n\n  3.1. Вызови mcp__exportby__get_unanalyzed с limit=25.\n       Если unanalyzed = 0, выведи \"Неотправленных: {pending}, новых для анализа нет.\" и ЗАВЕРШИ.\n\n  3.2. Для каждой компании выполни ДВУХЭТАПНУЮ оценку СТРОГО по описанию компании (поле description).\n       ВАЖНО: поле products может содержать мусорные данные — НЕ доверяй ему, если products противоречит description.\n\n       === ЭТАП 1: ТИП КОМПАНИИ ===\n\n       ✗ ИНОСТРАННАЯ КОМПАНИЯ → ОТКАЗ:\n       Если из описания или названия видно, что компания НЕ белорусская — ОТКАЗ.\n\n       ✓ ПРОИЗВОДИТЕЛЬ/ЭКСПОРТЁР → переходи к этапу 2:\n       Признаки: собственное производство, завод, фабрика, экспорт своей продукции.\n\n       ✗ ИМПОРТЁР/ДИСТРИБЬЮТОР → ОТКАЗ:\n       Признаки: перепродажа чужих брендов, представительство иностранных компаний.\n\n       ✗ СЕРВИСНЫЕ/ЛОКАЛЬНЫЕ КОМПАНИИ → ОТКАЗ:\n       Компании без физических товаров на экспорт: услуги, общепит, розница.\n\n       ПРИНЦИП: если неясно, производитель это или импортёр — склоняйся к ОТКАЗУ.\n\n       === ЭТАП 1.5: ИССЛЕДОВАНИЕ ПРИ СОМНЕНИЯХ ===\n\n       Обязательно исследуй компанию через веб, если:\n       — description слишком короткое (< 50 символов)\n       — неясно, производитель это или импортёр/дистрибьютор\n       — непонятно, какую именно продукцию выпускает (пищевая vs. промышленная и т.п.)\n       — есть сомнения в правильной классификации aviation_priority\n\n       Как исследовать:\n       1. WebFetch по url компании (если есть) — основной источник.\n       2. WebSearch по названию компании — если WebFetch не дал ясности.\n       Цель: получить достаточно информации для уверенной классификации.\n       НЕ исследуй компании, где всё очевидно из description.\n\n       === ЭТАП 2: ПРИОРИТЕТ АВИАПЕРЕВОЗКИ ===\n\n       aviation_priority = 2 (высокий): живые растения (цветы, саженцы, рассада, декоративные,\n       элитный семенной материал), фармацевтика, медоборудование, биоматериалы (образцы,\n       реагенты, культуры), электроника, оптика, ювелирные изделия.\n       Высокая ценность/кг ИЛИ критичность сроков.\n\n       aviation_priority = 1 (средний): малые партии, срочные заказы, труднодоступные регионы.\n\n       aviation_priority = 0 (низкий → ОТКАЗ): замороженные продукты, консервы, сырьё,\n       стройматериалы, тяжёлые грузы, мебель, текстиль. НЕ вставлять в companies.\n\n       ⚠️ ПИЩЕВАЯ/СЕЛЬХОЗ ПРОДУКЦИЯ = ОТКАЗ (priority 0):\n       Мясо, рыба, птица, овощи, фрукты, молочка, зерно, корма — всё это\n       перевозится рефрижераторами/контейнерами, НЕ авиа. Агрокомбинаты, мясокомбинаты,\n       молокозаводы, птицефабрики, рыбхозы → ОТКАЗ.\n       Исключение: живые растения и элитный семенной материал (priority 2).\n\n       needs_aviation = 1 если aviation_priority >= 1\n\n  3.3. Для подходящих: mcp__database__execute с INSERT OR IGNORE INTO companies\n       (name, url, description, products, needs_aviation, aviation_priority, found_date, status)\n       VALUES ('...', url, '...', '', needs_aviation, priority, '{{.Date}}', 'new')\n       Бери url из ответа get_unanalyzed как есть.\n\n  3.4. ОБЯЗАТЕЛЬНО вызови mcp__exportby__reject_companies для ВСЕХ отклонённых.\n\n  3.5. Запиши в scan_log итог через mcp__database__execute.\n\n  3.6. Вызови mcp__exportby__get_pending_count повторно.\n       Если pending >= 15 → переходи к ОТПРАВКЕ (шаг 4).\n       Иначе → выведи \"Накоплено: {pending} лидов из 15. Отправка отложена.\" и ЗАВЕРШИ.\n\nШАГ 4. ОТПРАВКА:\n\n  4.1. Вызови mcp__exportby__export_leads_excel — получишь путь к Excel и статистику.\n\n  4.2. Составь сводку ТОЧНО в формате:\n       \U0001F4CA Авиационные лиды — {{.Date}}\n       Новых: {total_leads}\n       Приоритетных (\U0001F534): {high_priority}\n       \U0001F4CE Excel-файл с деталями приложен.\n\n  4.3. Отправь сводку через mcp__telegram__send_message.\n  4.4. Отправь Excel через mcp__telegram__send_document (file_path из 4.1).\n  4.5. Отправь email через mcp__email__send_report на alexstav1975@yandex.by,\n       тема \"\U0001F4CA Авиационные лиды — {{.Date}}\", тело = сводка, вложение = Excel.\n  4.6. Вызови mcp__exportby__mark_exported.\n\nВАЖНО: НЕ выводи текстовый анализ каждой компании. Сразу вызывай tool calls.\nГруппируй по несколько компаний за один вызов. Текстовый вывод — только финальная статистика."
      work_dir: .
      tags:
        - leads
        - aviation
        - export-by
        - process
      model: sonnet
      timeout: 20m
      mcp_servers:
        - database
        - exportby
        - telegram
        - email
      allowed_tools:
        - mcp__exportby__get_pending_count
        - mcp__exportby__get_unanalyzed
        - mcp__exportby__reject_companies
        - mcp__exportby__export_leads_excel
        - mcp__exportby__mark_exported
        - mcp__database__query
        - mcp__database__execute
        - mcp__database__insert
        - mcp__telegram__send_message
        - mcp__telegram__send_document
        - mcp__email__send_report
        - WebFetch
        - WebSearch
      max_turns: 50
      permission_mode: bypassPermissions
pipelines:
    - name: review-fix
      mode: sequential
      steps:
        - task: code-review
        - task: code-fixer
      max_iterations: 10
      stop_signal: LGTM
    - name: leads-to-ceo
      mode: sequential
      steps:
        - task: find-leads
        - task: compile-leads-excel
        - task: deliver-leads-report
      max_iterations: 1
    - name: export-by-sync
      mode: sequential
      steps:
        - task: sync-export-by-catalog
      max_iterations: 1
    - name: export-by-aviation-to-ceo
      mode: sequential
      steps:
        - task: sync-export-by-catalog
        - task: process-export-by-leads
      max_iterations: 1
mcp_servers:
    - name: database
      command: ./bin/mcp-database
    - name: excel
      command: ./bin/mcp-excel
    - name: email
      command: ./bin/mcp-email
    - name: telegram
      command: ./bin/mcp-telegram
    - name: filesystem
      command: ./bin/mcp-filesystem
    - name: exportby
      command: ./bin/mcp-exportby
domains:
    export-by-aviation:
        description: Лиды с export.by — белорусские экспортёры, нуждающиеся в авиаперевозке грузов. MCP-сервер exportby выполняет скрейпинг сайта и хранит сырые данные в raw_companies. Задача analyze оценивает aviation_priority на основе данных в БД без обращения к сайту.
        data_dir: data/export-by-aviation
        db: leads.db
        schema: |-
            CREATE TABLE IF NOT EXISTS companies (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              name TEXT NOT NULL,
              url TEXT,
              description TEXT,
              products TEXT,
              contact_info TEXT,
              export_destinations TEXT,
              needs_aviation INTEGER DEFAULT 0,
              aviation_priority INTEGER DEFAULT 0,
              found_date TEXT NOT NULL,
              status TEXT DEFAULT 'new',
              sent_at TEXT,
              notes TEXT,
              UNIQUE(name)
            );

            CREATE TABLE IF NOT EXISTS scan_log (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              scanned_at TEXT NOT NULL,
              pages_scanned INTEGER,
              new_leads_found INTEGER,
              notes TEXT
            );

            CREATE TABLE IF NOT EXISTS raw_companies (
              id INTEGER PRIMARY KEY,
              export_by_id INTEGER UNIQUE NOT NULL,
              name TEXT NOT NULL,
              description TEXT,
              country TEXT,
              logo TEXT,
              products TEXT,
              products_fetched INTEGER DEFAULT 0,
              scraped_at TEXT NOT NULL,
              updated_at TEXT
            );

            CREATE TABLE IF NOT EXISTS scan_progress (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              last_page INTEGER NOT NULL,
              total_pages INTEGER,
              total_companies INTEGER,
              companies_added INTEGER DEFAULT 0,
              scanned_at TEXT NOT NULL
            );

            CREATE TABLE IF NOT EXISTS rejected_companies (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              name TEXT UNIQUE NOT NULL,
              reason TEXT,
              rejected_at TEXT NOT NULL
            );
        domain_doc: DOMAIN.md
        tasks:
            - sync-export-by-catalog
            - process-export-by-leads
        pipelines:
            - export-by-aviation-to-ceo
            - export-by-sync
        agents:
            - export-by-scraper
        mcp_servers:
            - database
            - exportby
            - telegram
            - email
    leads:
        description: B2B logistics leads for EAEU market
        data_dir: data/leads
        db: leads.db
        schema: |
            CREATE TABLE IF NOT EXISTS leads (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              name TEXT NOT NULL,
              tax_id TEXT,
              country TEXT,
              industry TEXT,
              city TEXT,
              website TEXT,
              contact_person TEXT,
              contact_email TEXT,
              contact_phone TEXT,
              source_url TEXT,
              status TEXT DEFAULT 'new',
              notes TEXT,
              raw_json TEXT,
              found_at DATETIME DEFAULT CURRENT_TIMESTAMP,
              updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
            );
            CREATE UNIQUE INDEX IF NOT EXISTS idx_leads_tax_id ON leads(tax_id) WHERE tax_id IS NOT NULL;
            CREATE INDEX IF NOT EXISTS idx_leads_name ON leads(name);
        domain_doc: DOMAIN.md
        tasks:
            - find-leads
            - compile-leads-excel
            - deliver-leads-report
        pipelines:
            - leads-to-ceo
        agents:
            - eaeu-logistics-lead-finder
            - leads-report-compiler
        mcp_servers:
            - database
            - excel
