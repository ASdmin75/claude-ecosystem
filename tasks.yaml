            CREATE TABLE IF NOT EXISTS manufacturers (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              name TEXT NOT NULL,
              legal_name TEXT,
              address TEXT,
              city TEXT,
              website TEXT,
              phone TEXT,
              email TEXT,
