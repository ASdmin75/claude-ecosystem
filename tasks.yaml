claude_bin: claude
tasks:
    - name: code-review
      prompt: |
        Review the Go code in the working directory.
        Focus on: error handling, concurrency safety, and idiomatic Go patterns.
        Output a brief summary of findings.

        Rate each finding as High, Medium, or Low severity.

        If there are no High or Medium severity findings remaining, output the
        exact line "LGTM" at the end of your response to signal that the code
        is in good shape.

        {{if .PrevOutput}}
        Previous review/fix context from the last iteration:
        ---
        {{.PrevOutput}}
        ---
        Focus on whether previous issues were fixed and look for any new issues
        introduced by the fixes. Do not repeat issues that have already been fixed.
        {{end}}
      work_dir: .
      tags:
        - review
        - quality
    - name: code-fixer
      prompt: |
        You are a code fixer. Apply the fixes described in the review below.
        Only fix High and Medium severity issues. Leave Low severity issues alone.
        Make minimal, targeted changes — do not refactor or restructure beyond
        what is needed to fix the specific issues.

        Review findings to fix:
        ---
        {{.PrevOutput}}
        ---
      work_dir: .
      tags:
        - fix
        - quality
      timeout: 10m
    - name: test-generator
      prompt: |
        Analyze the Go source files and generate missing unit tests.
        Use table-driven tests where appropriate.
        Only output the test code, no explanations.
      work_dir: .
      tags:
        - tests
    - name: on-save-lint
      prompt: |
        Review the recently changed file: {{.File}}
        Check for common Go mistakes, suggest improvements.
        Be concise - max 5 bullet points.
      work_dir: .
      watch:
        paths:
            - .
        extensions:
            - .go
        debounce: 3s
      tags:
        - lint
        - realtime
    - name: todo-tracker
      prompt: |
        Find all TODO, FIXME, HACK comments in the codebase.
        Categorize by priority and suggest an action plan.
      work_dir: .
      tags:
        - tracking
    - name: find-new-eaeu-logistics-lead
      prompt: "Найди 100 новых потенциальных клиентов для логистическо-экспедиционной компании из РБ работающей на рынке ЕАЭС с ледующих отраслях:\n- фарма\n- электроника\nКомапнии должны быть резидентами РБ. \nИспользуй сабагента eaeu-logistics-lead-finder"
      work_dir: .
      model: sonnet
      timeout: 60m
      permission_mode: dontAsk
    - name: find-leads
      domain: leads
      prompt: |
        Найди 50 новых потенциальных клиентов для логистическо-экспедиционной компании из РБ работающей на рынке ЕАЭС с ледующих отраслях:
        - фарма
        - электроника
        - химическая и нефтехимическая промышленность
        - деревообрабатывающая и целлюлозно-бумажная промышленность
        - машиностроение и металлообработка
        Комапнии должны быть резидентами РБ.
        Используй сабагента eaeu-logistics-lead-finder
      work_dir: .
      tags:
        - leads
        - sales
      model: sonnet
      timeout: 60m
      agents:
        - eaeu-logistics-lead-finder
      mcp_servers:
        - database
      allowed_tools:
        - Agent
        - WebSearch
        - WebFetch
        - mcp__database__check_exists
        - mcp__database__insert
        - mcp__database__query
      max_turns: 50
      permission_mode: dontAsk
    - name: compile-leads-excel
      domain: leads
      prompt: |
        Получи все лиды из базы данных через mcp__database__query.
        SQL: SELECT * FROM leads WHERE status = 'new' ORDER BY found_at DESC

        Создай Excel-отчёт для CEO: workspace/leads/leads-report-{{.DateTime}}.xlsx
        Используй инструменты create_spreadsheet и add_styled_table.
        Добавь лист 'Leads' с таблицей всех лидов и лист 'Summary' с итогами по источникам.
        Верни только путь к созданному файлу.
      work_dir: .
      tags:
        - leads
        - excel
      timeout: 10m
      agents:
        - leads-report-compiler
      mcp_servers:
        - excel
        - database
      allowed_tools:
        - mcp__excel__create_spreadsheet
        - mcp__excel__add_styled_table
        - mcp__excel__write_spreadsheet
        - mcp__excel__read_spreadsheet
        - mcp__database__query
      permission_mode: dontAsk
    - name: deliver-leads-report
      domain: leads
      prompt: "Доставь отчёт по лидам. Файл: {{.PrevOutput}}\n\nШаг 1. Одним запросом получи данные:\nSELECT COUNT(*) AS total FROM leads WHERE status='new';\nSELECT COUNT(DISTINCT source_url) AS sources FROM leads WHERE status='new';\nSELECT name, industry FROM leads WHERE status='new' ORDER BY found_at DESC LIMIT 5;\n\nШаг 2. Составь сводку ТОЧНО в этом формате (подставь данные):\n\U0001F4CA Отчёт по лидам — {{.Date}}\nНовых: {total}\nИсточников: {sources}\nТоп:\n• {name} — {industry}\n\U0001F4CE Excel-файл с деталями приложен.\n\nШаг 3. Отправь эту сводку через send_message в Telegram.\nШаг 4. Отправь Excel через send_document в Telegram.\nШаг 5. Отправь email на alexstav1975@yandex.by, тема \"\U0001F4CA Отчёт по лидам — {{.Date}}\", тело = та же сводка, вложение = Excel.\nШаг 6. Скопируй файл в workspace/ceo/reports/.\n\nСводка в TG и email ИДЕНТИЧНА. Ничего лишнего не добавляй.\n"
      work_dir: .
      tags:
        - leads
        - delivery
      timeout: 10m
      agents:
        - delivery-agent
      mcp_servers:
        - email
        - filesystem
        - telegram
        - database
      allowed_tools:
        - mcp__email__send_email
        - mcp__filesystem__copy_file
        - mcp__telegram__send_message
        - mcp__telegram__send_document
        - mcp__database__query
      permission_mode: dontAsk
    - name: sync-export-by-catalog
      domain: export-by-aviation
      prompt: |-
        Сегодня {{.Date}}. Синхронизируй каталог компаний с export.by в локальную БД.

        1. Вызови mcp__exportby__get_stats — проверь текущий прогресс.
        2. Если каталог ещё не полностью просканирован, вызови mcp__exportby__sync_catalog с max_pages=100 для продолжения.
        3. Если каталог уже полный, вызови mcp__exportby__check_new для проверки новых записей.
        4. Проверь финальную статистику через mcp__exportby__get_stats.

        Формат вывода:
        СИНХРОНИЗАЦИЯ: страниц N/N, компаний в БД N из N
        НОВЫХ КОМПАНИЙ: N
        СТАТУС: [завершено/в процессе]
      work_dir: .
      tags:
        - leads
        - aviation
        - export-by
        - sync
      model: haiku
      timeout: 10m
      mcp_servers:
        - exportby
      allowed_tools:
        - mcp__exportby__sync_catalog
        - mcp__exportby__check_new
        - mcp__exportby__get_stats
      max_turns: 15
      max_budget_usd: 0.05
      permission_mode: bypassPermissions
    - name: process-export-by-leads
      domain: export-by-aviation
      prompt: "Сегодня {{.Date}}. Обработай лиды для авиаперевозки.\nПорог отправки: 15 лидов.\n\n=== АЛГОРИТМ ===\n\nШАГ 1. Вызови mcp__exportby__get_pending_count И mcp__exportby__get_unanalyzed с limit=1 ОДНОВРЕМЕННО.\n       — pending = количество готовых лидов (status='new')\n       — unanalyzed = количество непроанализированных компаний\n\nШАГ 2. РАННИЙ ВЫХОД: если pending < 15 И unanalyzed = 0 →\n       выведи \"Накоплено: {pending} лидов из 15. Новых для анализа нет. Каталог полностью обработан.\" и ЗАВЕРШИ НЕМЕДЛЕННО.\n\nШАГ 3. ЕСЛИ pending >= 15 → переходи к ОТПРАВКЕ (шаг 5).\n\nШАГ 4. ЕСЛИ pending < 15 → выполни АНАЛИЗ новой порции:\n\n  4.1. Вызови mcp__exportby__get_unanalyzed с limit=25.\n\n  4.2. Для каждой компании выполни ДВУХЭТАПНУЮ оценку СТРОГО по описанию компании (поле description).\n       ВАЖНО: поле products может содержать мусорные данные — НЕ доверяй ему, если products противоречит description.\n\n       === ЭТАП 1: ТИП КОМПАНИИ ===\n\n       ✗ ИНОСТРАННАЯ КОМПАНИЯ → ОТКАЗ:\n       Если из описания или названия видно, что компания НЕ белорусская — ОТКАЗ.\n\n       ✓ ПРОИЗВОДИТЕЛЬ/ЭКСПОРТЁР → переходи к этапу 2:\n       Признаки: собственное производство, завод, фабрика, экспорт своей продукции.\n\n       ✗ ИМПОРТЁР/ДИСТРИБЬЮТОР → ОТКАЗ:\n       Признаки: перепродажа чужих брендов, представительство иностранных компаний.\n\n       ✗ СЕРВИСНЫЕ/ЛОКАЛЬНЫЕ КОМПАНИИ → ОТКАЗ:\n       Компании без физических товаров на экспорт: услуги, общепит, розница.\n\n       ПРИНЦИП: если неясно, производитель это или импортёр — склоняйся к ОТКАЗУ.\n\n       === ЭТАП 1.5: ИССЛЕДОВАНИЕ ПРИ СОМНЕНИЯХ ===\n\n       Обязательно исследуй компанию через веб, если:\n       — description слишком короткое (< 50 символов)\n       — неясно, производитель это или импортёр/дистрибьютор\n       — непонятно, какую именно продукцию выпускает (пищевая vs. промышленная и т.п.)\n       — есть сомнения в правильной классификации aviation_priority\n\n       Как исследовать:\n       1. WebFetch по url компании (если есть) — основной источник.\n       2. WebSearch по названию компании — если WebFetch не дал ясности.\n       Цель: получить достаточно информации для уверенной классификации.\n       НЕ исследуй компании, где всё очевидно из description.\n\n       === ЭТАП 2: ПРИОРИТЕТ АВИАПЕРЕВОЗКИ ===\n\n       aviation_priority = 2 (высокий): живые растения (цветы, саженцы, рассада, декоративные,\n       элитный семенной материал), фармацевтика, медоборудование, биоматериалы (образцы,\n       реагенты, культуры), электроника, оптика, ювелирные изделия.\n       Высокая ценность/кг ИЛИ критичность сроков.\n\n       aviation_priority = 1 (средний): малые партии, срочные заказы, труднодоступные регионы.\n\n       aviation_priority = 0 (низкий → ОТКАЗ): замороженные продукты, консервы, сырьё,\n       стройматериалы, тяжёлые грузы, мебель, текстиль. НЕ вставлять в companies.\n\n       ⚠️ ПИЩЕВАЯ/СЕЛЬХОЗ ПРОДУКЦИЯ = ОТКАЗ (priority 0):\n       Мясо, рыба, птица, овощи, фрукты, молочка, зерно, корма — всё это\n       перевозится рефрижераторами/контейнерами, НЕ авиа. Агрокомбинаты, мясокомбинаты,\n       молокозаводы, птицефабрики, рыбхозы → ОТКАЗ.\n       Исключение: живые растения и элитный семенной материал (priority 2).\n\n       needs_aviation = 1 если aviation_priority >= 1\n\n  4.3. Для подходящих: mcp__database__execute с INSERT OR IGNORE INTO companies\n       (export_by_id, name, url, description, products, needs_aviation, aviation_priority, found_date, status)\n       VALUES (export_by_id, 'ТОЧНОЕ имя из get_unanalyzed', url, '...', '', needs_aviation, priority, '{{.Date}}', 'new')\n       ВАЖНО: name должно быть ТОЧНО таким же, как в ответе get_unanalyzed. НЕ сокращай (ОАО вместо Открытое акционерное общество и т.п.).\n       Бери url и export_by_id из ответа get_unanalyzed как есть.\n\n  4.4. ОБЯЗАТЕЛЬНО вызови mcp__exportby__reject_companies для ВСЕХ отклонённых.\n\n  4.5. Запиши в scan_log итог через mcp__database__execute.\n\n  4.6. Вызови mcp__exportby__get_pending_count повторно.\n       Если pending >= 15 → переходи к ОТПРАВКЕ (шаг 5).\n       Иначе → выведи \"Накоплено: {pending} лидов из 15. Отправка отложена.\" и ЗАВЕРШИ.\n\nШАГ 5. ОТПРАВКА:\n\n  5.1. Вызови mcp__exportby__export_leads_excel — получишь путь к Excel и статистику.\n\n  5.2. Составь сводку ТОЧНО в формате:\n       \U0001F4CA Авиационные лиды — {{.Date}}\n       Новых: {total_leads}\n       Приоритетных (\U0001F534): {high_priority}\n       \U0001F4CE Excel-файл с деталями приложен.\n\n  5.3. Отправь сводку через mcp__telegram__send_message.\n  5.4. Отправь Excel через mcp__telegram__send_document (file_path из 5.1).\n  5.5. Отправь email через mcp__email__send_report на alexstav1975@yandex.by,\n       тема \"\U0001F4CA Авиационные лиды — {{.Date}}\", тело = сводка, вложение = Excel.\n  5.6. Вызови mcp__exportby__mark_exported.\n\nВАЖНО: НЕ выводи текстовый анализ каждой компании. Сразу вызывай tool calls.\nГруппируй по несколько компаний за один вызов. Текстовый вывод — только финальная статистика."
      work_dir: .
      tags:
        - leads
        - aviation
        - export-by
        - process
      model: sonnet
      timeout: 20m
      mcp_servers:
        - database
        - exportby
        - telegram
        - email
      allowed_tools:
        - mcp__exportby__get_pending_count
        - mcp__exportby__get_unanalyzed
        - mcp__exportby__reject_companies
        - mcp__exportby__export_leads_excel
        - mcp__exportby__mark_exported
        - mcp__database__query
        - mcp__database__execute
        - mcp__database__insert
        - mcp__telegram__send_message
        - mcp__telegram__send_document
        - mcp__email__send_report
        - WebFetch
        - WebSearch
      max_turns: 50
      permission_mode: bypassPermissions
    - name: research-vet-manufacturers
      domain: vet-manufacturers-belarus
      prompt: |-
        Дата исследования: {{.Date}}

        Проведи исследование производителей ветеринарных препаратов в Республике Беларусь.

        ШАГ 0 — Инициализация сеанса:
        1. Сгенерируй уникальный session_id в формате: vet-YYYYMMDD-HHMMSS (например vet-20260318-143052)
        2. Выполни SELECT name, updated_at FROM manufacturers ORDER BY name — это список УЖЕ известных. НЕ ТРАТЬ бюджет на их повторный поиск.
        3. Создай запись в sync_log: INSERT INTO sync_log (session_id, notes) VALUES ('{session_id}', 'started')

        Стратегия работы:
        - ВСЕ INSERT и UPDATE должны содержать session_id текущего сеанса
        - Сохраняй каждого НОВОГО производителя в БД СРАЗУ после нахождения
        - Используй check_exists перед insert чтобы избежать дубликатов
        - Начни с официальных реестров, затем расширяй поиск
        - Для существующих записей: обновляй ТОЛЬКО если нашёл новую информацию

        Задачи:
        1. Инициализация (ШАГ 0)
        2. Найди НОВЫХ производителей через поиск
        3. Для каждого: экспорт, авиатранспорт, страны назначения
        4. СРАЗУ сохраняй в БД с session_id текущего сеанса
        5. Обнови существующие если нашлась новая информация (тоже проставь session_id)
        6. Обнови sync_log: UPDATE sync_log SET manufacturers_added=N, manufacturers_updated=M, notes='completed' WHERE session_id='{session_id}'

        По завершении выведи (ОБЯЗАТЕЛЬНО включи session_id в первой строке):
        SESSION_ID: {session_id}
        - Всего в БД
        - Новых добавлено / обновлено
        - Список экспортёров
        - Список авиаэкспортёров
      work_dir: .
      schedule: 0 8 * * 1
      tags:
        - vet
        - belarus
        - research
        - manufacturers
      model: sonnet
      timeout: 30m
      agents:
        - vet-manufacturers-researcher
      mcp_servers:
        - database
      allowed_tools:
        - Agent
        - mcp__database__query
        - mcp__database__execute
        - mcp__database__insert
        - mcp__database__check_exists
        - mcp__database__list_tables
        - mcp__database__describe_table
      max_turns: 25
      max_budget_usd: 8
      permission_mode: dontAsk
    - name: compile-vet-manufacturers-excel
      domain: vet-manufacturers-belarus
      prompt: |-
        Сформируй Excel-отчёт по НОВЫМ производителям ветеринарных препаратов Беларуси, найденным в текущем сеансе.

        Исходные данные — предыдущий вывод:
        {{.PrevOutput}}

        Извлеки SESSION_ID из предыдущего вывода (строка вида SESSION_ID: vet-XXXXXXXX-XXXXXX). Используй его для фильтрации.

        Фильтрация: выгружай ТОЛЬКО записи текущего сеанса:
        WHERE session_id = '{извлечённый session_id}'

        Структура отчёта (3 листа):

        **Лист 1 — Новые производители (сеанс)**
        SQL: SELECT * FROM manufacturers WHERE session_id = '{session_id}'
        Колонки: Название | Юр. название | Адрес | Город | Сайт | Телефон | Email | № лицензии | Экспорт | Авиаэкспорт | Страны экспорта | Категории продуктов

        **Лист 2 — Новые экспортёры**
        SQL: SELECT * FROM manufacturers WHERE session_id = '{session_id}' AND exports_abroad = 1
        Те же колонки + выделить авиаэкспортёров цветом.

        **Лист 3 — Новые авиаэкспортёры**
        SQL: SELECT * FROM manufacturers WHERE session_id = '{session_id}' AND air_export = 1
        Колонки: Название | Страны | Примечания по авиадоставке | Категории товаров | Контакты

        Если записей нет — создай файл с пустыми таблицами (только заголовки).
        Файл: data/vet-manufacturers-belarus/vet-manufacturers-{{.Date}}.xlsx
        Используй mcp__excel__create_spreadsheet или mcp__excel__write_spreadsheet.

        В конце ОБЯЗАТЕЛЬНО выведи всю эту информацию (deliver-шаг зависит от неё):
        SESSION_ID: <session_id>
        NEW_COUNT: <количество новых>
        EXPORTERS: <количество экспортёров>
        AIR_EXPORTERS: <количество авиаэкспортёров>
        FILE: <путь к файлу>
        Краткая сводка: топ-3 компании с категориями продукции (если есть).
      work_dir: .
      tags:
        - vet
        - belarus
        - excel
        - report
      model: sonnet
      timeout: 10m
      mcp_servers:
        - database
        - excel
        - filesystem
      allowed_tools:
        - mcp__database__query
        - mcp__database__list_tables
        - mcp__database__describe_table
        - mcp__excel__create_spreadsheet
        - mcp__excel__write_spreadsheet
        - mcp__excel__add_styled_table
        - mcp__filesystem__write_file
        - mcp__filesystem__list_directory
      max_turns: 20
      permission_mode: dontAsk
    - name: deliver-vet-manufacturers-report
      domain: vet-manufacturers-belarus
      prompt: |-
        Отправь отчёт по НОВЫМ производителям ветеринарных препаратов Беларуси.

        Данные из предыдущего шага (здесь уже есть вся нужная информация — НЕ пытайся читать xlsx файл):
        {{.PrevOutput}}

        Извлеки SESSION_ID и статистику из текста выше.

        Путь к файлу отчёта: data/vet-manufacturers-belarus/vet-manufacturers-{{.Date}}.xlsx

        Действия:
        1. Проверь что файл существует через mcp__filesystem__list_directory (папка data/vet-manufacturers-belarus/)
        2. Отправь в Telegram текстовое сообщение с резюме (данные бери из PrevOutput, НЕ читай xlsx):
           - Дата: {{.Date}}, сеанс: <SESSION_ID>
           - Новых производителей добавлено в этом сеансе
           - Из них экспортёров
           - Из них авиаэкспортёров
           - Список новых авиаэкспортёров с их странами
           - Общее кол-во производителей в БД (итого за всё время)
        3. Отправь файл xlsx как документ в Telegram через mcp__telegram__send_document указав путь к файлу.

        Если новых не найдено — отправь короткое сообщение: "Сеанс <SESSION_ID>: новых производителей не найдено. Всего в БД: N".
        Формат — краткий деловой отчёт на русском языке.
      work_dir: .
      tags:
        - vet
        - belarus
        - telegram
        - delivery
      model: haiku
      timeout: 5m
      mcp_servers:
        - telegram
        - filesystem
      allowed_tools:
        - mcp__telegram__send_message
        - mcp__telegram__send_document
        - mcp__filesystem__list_directory
        - mcp__filesystem__read_file
