        - mcp__database__insert
        - mcp__database__check_exists
      max_turns: 20
      max_budget_usd: 0.5
      permission_mode: dontAsk
    - name: aviation-hub-monitor
      domain: aviation-monitoring
      prompt: |
        Сегодня {{.Date}}. Мониторинг грузовых рейсов аэропорта FRA (Frankfurt).

        ВАЖНО: Используй ТОЛЬКО эндпоинт getflights (НЕ gettimetable — он заблокирован по rate limit).
        Делай не более 2 вызовов API суммарно.

        ШАГ 1 — Проверь структуру БД:
        Вызови mcp__database__list_tables и mcp__database__describe_table для hub_snapshots и tracked_flights.

        ШАГ 2 — Получи рейсы FRA (не более 2 вызовов getflights):
        - Вызов 1: getflights с dep_iata=FRA, limit=100 (вылеты из Франкфурта)
        - Вызов 2: getflights с arr_iata=FRA, limit=100 (прилёты во Франкфурт)

        ШАГ 3 — Обработай данные:
        Из полученных рейсов подсчитай:
        - total_flights: все рейсы (вылеты + прилёты)
        - cargo_flights: рейсы грузовых авиакомпаний (airline.iata среди: TK, CV, EK, FX, 5X, PO, BO, QY, GEC, CLX)
          Также считай грузовыми рейсы с числовыми номерами > 5000 (обычно cargo)
        - delayed_flights: рейсы где departure.delay > 0 или flight_status = «active» с опозданием
        - cancelled_flights: рейсы со статусом «cancelled»

        Для каждого грузового рейса сохрани в tracked_flights:
        INSERT OR IGNORE INTO tracked_flights (flight_iata, airline_name, dep_iata, arr_iata, flight_date, status, dep_scheduled, dep_actual, arr_scheduled, arr_actual, delay_minutes)
        VALUES (...)

        ШАГ 4 — Сохрани снимок хаба:
        INSERT INTO hub_snapshots (hub_iata, snapshot_date, total_flights, cargo_flights, delayed_flights, cancelled_flights, report_text)
        VALUES ('FRA', '{{.Date}}', <total>, <cargo>, <delayed>, <cancelled>, '<краткое резюме>')
        Если запись за сегодня уже есть — обнови через UPDATE.

        ШАГ 5 — Выведи детальный отчёт:
        - Статистика FRA за {{.Date}}: всего / грузовых / задержанных / отменённых
        - Таблица грузовых рейсов: flight_iata, авиакомпания, маршрут (dep→arr), статус, задержка
        - Строка «Файл отчёта: data/aviation-monitoring/reports/aviation-report-{{.Date}}.xlsx»
      work_dir: .
      tags:
        - aviation
        - cargo
        - hub
        - fra
        - monitor
      model: sonnet
      timeout: 5m
      mcp_servers:
        - aviationstack-api
        - database
      allowed_tools:
