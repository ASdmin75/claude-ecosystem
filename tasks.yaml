domains:
    4logist:
        description: '4Logist CRM data: orders, clients, invoices, and order status change history for daily reporting and real-time monitoring'
        data_dir: data/4logist
        db: 4logist.db
        schema: CREATE TABLE IF NOT EXISTS orders (id INTEGER PRIMARY KEY AUTOINCREMENT, order_id TEXT UNIQUE, client_id TEXT, status TEXT, created_date TEXT, delivery_date TEXT, amount REAL, cargo_type TEXT, origin TEXT, destination TEXT, notes TEXT, raw_json TEXT, fetched_at TEXT DEFAULT CURRENT_TIMESTAMP, updated_at TEXT DEFAULT CURRENT_TIMESTAMP); CREATE TABLE IF NOT EXISTS clients (id INTEGER PRIMARY KEY AUTOINCREMENT, client_id TEXT UNIQUE, name TEXT, contact_person TEXT, phone TEXT, email TEXT, address TEXT, raw_json TEXT, fetched_at TEXT DEFAULT CURRENT_TIMESTAMP, updated_at TEXT DEFAULT CURRENT_TIMESTAMP); CREATE TABLE IF NOT EXISTS invoices (id INTEGER PRIMARY KEY AUTOINCREMENT, invoice_id TEXT UNIQUE, order_id TEXT, client_id TEXT, amount REAL, status TEXT, issue_date TEXT, due_date TEXT, paid_date TEXT, raw_json TEXT, fetched_at TEXT DEFAULT CURRENT_TIMESTAMP, updated_at TEXT DEFAULT CURRENT_TIMESTAMP); CREATE TABLE IF NOT EXISTS order_status_history (id INTEGER PRIMARY KEY AUTOINCREMENT, order_id TEXT NOT NULL, status TEXT NOT NULL, previous_status TEXT, changed_at TEXT DEFAULT CURRENT_TIMESTAMP, notified INTEGER DEFAULT 0);
        domain_doc: DOMAIN.md
        tasks:
            - 4log-fetch-daily-data
            - 4log-compile-daily-excel
            - 4log-deliver-daily-report
            - 4log-fetch-active-orders
            - 4log-notify-order-changes
        pipelines:
            - 4log-daily-report
            - 4log-order-monitor
        mcp_servers:
            - 4log-api
            - database
            - excel
            - telegram
            - filesystem
    aviation-monitoring:
        description: 'AviationStack flight monitoring: tracked cargo flights (TK/CV/EK) and FRA hub daily snapshots'
        data_dir: data/aviation-monitoring
        db: flights.db
        schema: CREATE TABLE IF NOT EXISTS tracked_flights (id INTEGER PRIMARY KEY AUTOINCREMENT, flight_iata TEXT, airline_name TEXT, dep_iata TEXT, arr_iata TEXT, flight_date TEXT, status TEXT, dep_scheduled TEXT, dep_actual TEXT, arr_scheduled TEXT, arr_actual TEXT, delay_minutes INTEGER, checked_at TEXT DEFAULT CURRENT_TIMESTAMP); CREATE TABLE IF NOT EXISTS hub_snapshots (id INTEGER PRIMARY KEY AUTOINCREMENT, hub_iata TEXT, snapshot_date TEXT, total_flights INTEGER, cargo_flights INTEGER, delayed_flights INTEGER, cancelled_flights INTEGER, report_text TEXT, created_at TEXT DEFAULT CURRENT_TIMESTAMP);
        tasks:
            - aviation-flight-tracker
            - aviation-hub-monitor
            - aviation-compile-report
            - aviation-deliver-report
        pipelines:
            - aviation-cargo-monitor
        mcp_servers:
            - aviationstack-api
            - database
            - excel
            - filesystem
            - telegram
    export-by-aviation:
        description: Лиды с export.by — белорусские экспортёры, нуждающиеся в авиаперевозке грузов. MCP-сервер exportby выполняет скрейпинг сайта и хранит сырые данные в raw_companies. Задача analyze оценивает aviation_priority на основе данных в БД без обращения к сайту.
        data_dir: data/export-by-aviation
        db: leads.db
        schema: |-
            CREATE TABLE IF NOT EXISTS companies (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              export_by_id INTEGER,
              name TEXT NOT NULL,
              url TEXT,
              description TEXT,
              products TEXT,
              contact_info TEXT,
              export_destinations TEXT,
              needs_aviation INTEGER DEFAULT 0,
              aviation_priority INTEGER DEFAULT 0,
              found_date TEXT NOT NULL,
              status TEXT DEFAULT 'new',
              sent_at TEXT,
              notes TEXT,
              UNIQUE(name)
            );

            CREATE TABLE IF NOT EXISTS scan_log (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              scanned_at TEXT NOT NULL,
              pages_scanned INTEGER,
              new_leads_found INTEGER,
              notes TEXT
            );

            CREATE TABLE IF NOT EXISTS raw_companies (
              id INTEGER PRIMARY KEY,
              export_by_id INTEGER UNIQUE NOT NULL,
              name TEXT NOT NULL,
              description TEXT,
              country TEXT,
              logo TEXT,
              products TEXT,
              products_fetched INTEGER DEFAULT 0,
              scraped_at TEXT NOT NULL,
              updated_at TEXT
            );

            CREATE TABLE IF NOT EXISTS scan_progress (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              last_page INTEGER NOT NULL,
              total_pages INTEGER,
              total_companies INTEGER,
              companies_added INTEGER DEFAULT 0,
              scanned_at TEXT NOT NULL
            );

            CREATE TABLE IF NOT EXISTS rejected_companies (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              name TEXT UNIQUE NOT NULL,
              reason TEXT,
              rejected_at TEXT NOT NULL
            );
        domain_doc: DOMAIN.md
        tasks:
            - sync-export-by-catalog
            - process-export-by-leads
        pipelines:
            - export-by-aviation-to-ceo
            - export-by-sync
        agents:
            - export-by-scraper
        mcp_servers:
            - database
            - exportby
            - telegram
            - email
    leads:
        description: B2B logistics leads for EAEU market
        data_dir: data/leads
        db: leads.db
        schema: |
            CREATE TABLE IF NOT EXISTS leads (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              name TEXT NOT NULL,
              tax_id TEXT,
              country TEXT,
              industry TEXT,
              city TEXT,
              website TEXT,
              contact_person TEXT,
              contact_email TEXT,
              contact_phone TEXT,
              source_url TEXT,
              status TEXT DEFAULT 'new',
              notes TEXT,
              raw_json TEXT,
              found_at DATETIME DEFAULT CURRENT_TIMESTAMP,
              updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
            );
            CREATE UNIQUE INDEX IF NOT EXISTS idx_leads_tax_id ON leads(tax_id) WHERE tax_id IS NOT NULL;
            CREATE INDEX IF NOT EXISTS idx_leads_name ON leads(name);
        domain_doc: DOMAIN.md
        tasks:
            - find-leads
            - compile-leads-excel
            - deliver-leads-report
        pipelines:
            - leads-to-ceo
        agents:
            - eaeu-logistics-lead-finder
            - leads-report-compiler
        mcp_servers:
            - database
            - excel
