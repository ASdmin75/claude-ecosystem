    - name: fetch-sip-recordings
      domain: sip-calls
      prompt: |-
        Today is {{.Date}}. Fetch all call recordings from the Yeastar P-Series SIP station for yesterday and store them locally.

        Authentication is handled automatically by the MCP server — no need to call getaccesstoken or pass access_token manually.

        Steps:
        1. Calculate yesterday's date from {{.Date}}.
        2. Call listrecordings with page_size=10000 to get ALL recording files. The API returns records with a "time" field (format: DD/MM/YYYY HH:mm:ss). Filter the results client-side to keep only recordings where the date part matches yesterday.
        3. If no recordings found for yesterday, output "0 recordings found for yesterday" and stop.
        4. Ensure the local directory $DOMAIN_DATA_DIR/recordings/ exists (create if needed using filesystem tools).
        5. Query existing call_ids: SELECT call_id FROM recordings; — build a set of known UIDs to skip duplicates.
        6. Also list existing files in $DOMAIN_DATA_DIR/recordings/ to avoid re-downloading files already on disk (even if not yet in DB).
        7. For each NEW recording (uid not in known set AND file not already on disk), call downloadrecording to get download_resource_url. Collect all {url, path} pairs.
        8. Use batch_download tool with the full array of {url, path} pairs to download ALL files in one call. This is critical for efficiency.
        9. Parse batch_download results. Skip any FAIL entries (do NOT insert them into DB). For each successfully downloaded file (marked "OK"), collect its metadata into a rows array.
        10. Use batch_insert tool to insert all successful records into the "recordings" table at once:
            table: "recordings"
            rows: [{call_id, filename, caller, callee, duration, call_date, download_path}, ...]
        11. Output: total recordings found in API for yesterday, new downloaded, skipped as duplicates, skipped as already on disk, failed downloads.
      work_dir: .
      tags:
        - sip
        - yeastar
        - fetch
        - recordings
      model: sonnet
      timeout: 30m
      mcp_servers:
        - yeastar-api
        - database
        - filesystem
      allowed_tools:
        - mcp__yeastar-api__searchcdr
        - mcp__yeastar-api__listcdr
        - mcp__yeastar-api__listrecordings
        - mcp__yeastar-api__downloadrecording
        - mcp__yeastar-api__download_file
        - mcp__yeastar-api__batch_download
        - mcp__database__query
        - mcp__database__execute
        - mcp__database__describe_table
        - mcp__database__batch_insert
        - mcp__filesystem__write_file
        - mcp__filesystem__read_file
        - mcp__filesystem__create_directory
        - mcp__filesystem__list_directory
      max_turns: 200
      max_budget_usd: 3
      permission_mode: dontAsk
    - name: transcribe-sip-recordings
      domain: sip-calls
      prompt: |-
        Transcribe all pending call recordings using batch_transcribe (single tool call for ALL files).

        Steps:
        1. Query: SELECT id, download_path FROM recordings WHERE transcription_path IS NULL AND download_path IS NOT NULL ORDER BY id;
        2. If no rows, output "0 recordings to transcribe" and stop.
        3. Collect all download_path values into an array.
        4. Call batch_transcribe with files=[array of paths], output_format="srt". This transcribes ALL files in one call.
        5. Parse the JSON result. For each file with status "ok" and a non-empty srt_path:
           UPDATE recordings SET transcription_path = '<srt_path>', processed_at = datetime('now') WHERE download_path = '<path>';
           Use a single execute call with multiple UPDATE statements separated by semicolons, or call execute once per file.
        6. Output: total transcribed, total failed.
      work_dir: .
      tags:
        - sip
        - whisper
        - transcription
      model: haiku
      timeout: 360m
      mcp_servers:
        - whisper
        - database
      allowed_tools:
        - mcp__whisper__batch_transcribe
        - mcp__database__query
        - mcp__database__execute
      max_turns: 30
      max_budget_usd: 0.5
      permission_mode: dontAsk
    - name: summarize-sip-transcriptions
      domain: sip-calls
      prompt: |-
        Today is {{.Date}}. Analyze and summarize all transcribed call recordings from yesterday that have not yet been summarized.
        IMPORTANT: All summaries and the digest MUST be written in Russian.

        Steps:
        1. Calculate yesterday's date from {{.Date}} (format: YYYY-MM-DD).
        2. Query: SELECT id, call_id, caller, callee, duration, transcription_path FROM recordings WHERE transcription_path IS NOT NULL AND summary IS NULL AND call_date = '<yesterday>';
        3. For each recording, read the SRT file from transcription_path using filesystem read_file, then generate a JSON summary object with fields (all text in Russian):
           - brief: 2-3 предложения с описанием разговора
           - topics: список ключевых тем
           - actions: список задач и действий (пустой массив если нет)
           - sentiment: 'positive', 'neutral', or 'negative'
        4. UPDATE recordings SET summary = '<json_string>' WHERE id = <id>.
        5. After processing all calls, compile a daily digest in Russian:
           - Count total calls and sum total duration for yesterday
           - Write a comprehensive digest (3-5 paragraphs) in Russian covering: обзор количества звонков, самые значимые разговоры, повторяющиеся темы, и сводный список всех задач
        6. INSERT OR REPLACE INTO daily_reports (report_date, total_calls, total_duration, digest) VALUES ('<yesterday>', <count>, <total_seconds>, '<digest_text_in_russian>');
        7. Output the full digest text so the next pipeline step can use it via {{.PrevOutput}}.
      work_dir: .
      tags:
        - sip
        - summary
        - analysis
      model: sonnet
      timeout: 30m
      mcp_servers:
        - database
        - filesystem
      allowed_tools:
        - mcp__database__query
        - mcp__database__execute
        - mcp__database__insert
        - mcp__database__list_tables
        - mcp__database__describe_table
        - mcp__filesystem__read_file
